<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Sign Up | Udyam Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-auth.css">
</head>
<body>
  <div class="auth-container">
    <a href="index.html" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Website
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h1>Admin Sign Up</h1>
        <p>Create your admin account for Udyam Foundation</p>
      </div>

      <div id="alertBox" class="alert" role="alert"></div>

      <form id="signupForm">
        <div class="role-group">
          <label>Select your role <span style="color: var(--danger)">*</span></label>
          <div class="role-options">
            <label class="role-option">
              <input type="radio" name="role" value="Executive Member" required>
              <span>Executive Member</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="President">
              <span>President</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="Office Secretary">
              <span>Office Secretary</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="Secretary">
              <span>Secretary</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="Program Incharge">
              <span>Program Incharge</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="Treasurer">
              <span>Treasurer</span>
            </label>
            <label class="role-option">
              <input type="radio" name="role" value="Communication Public Relations Officer">
              <span>Communication Public Relations Officer</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="fullName">Your Full Name</label>
          <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required autocomplete="name">
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required autocomplete="tel">
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label for="photo">Passport Size Photo (Optional)</label>
          <input type="file" id="photo" name="photo" accept="image/*">
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Create a password" required minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password"></button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Show password"></button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Create Account</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="admin-login.html">Sign In</a>
      </div>
    </div>
  </div>

  <script src="api-config.js"></script>`n  <script src="admin-auth.js"></script>
  <script>
    redirectIfAuthenticated();

    const form = document.getElementById('signupForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');
    const passwordInput = document.getElementById('password');
    const confirmInput = document.getElementById('confirmPassword');
    const togglePassword = document.getElementById('togglePassword');
    const toggleConfirm = document.getElementById('toggleConfirmPassword');

    togglePassword.innerHTML = eyeIcon();
    toggleConfirm.innerHTML = eyeIcon();
    initPasswordToggle(togglePassword, passwordInput);
    initPasswordToggle(toggleConfirm, confirmInput);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);

      const role = form.querySelector('input[name="role"]:checked');
      if (!role) {
        showAlert(alertBox, 'Please select your role');
        return;
      }

      if (passwordInput.value !== confirmInput.value) {
        showAlert(alertBox, 'Passwords do not match');
        return;
      }

      if (passwordInput.value.length < 6) {
        showAlert(alertBox, 'Password must be at least 6 characters');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Creating account...';

      try {
        const formData = new FormData();
        formData.append('fullName', document.getElementById('fullName').value.trim());
        formData.append('phone', document.getElementById('phone').value.trim());
        formData.append('email', document.getElementById('email').value.trim());
        formData.append('password', passwordInput.value);
        formData.append('role', role.value);
        const photoFile = document.getElementById('photo').files[0];
        if (photoFile) {
          formData.append('photo', photoFile);
        }

        const response = await fetch(`${API_BASE}/api/auth/signup`, {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Something went wrong');
        }

        setAuthSession(data.token, data.user);
        window.location.href = 'admin.html';
      } catch (err) {
        showAlert(alertBox, err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
