<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Udyam Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-auth.css">
</head>
<body>
  <div class="auth-container">
    <a href="admin-login.html" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
      </svg>
      Back to Login
    </a>

    <div class="auth-card">
      <div class="auth-header">
        <h1>Reset Password</h1>
        <p>Enter your email to receive a password reset link</p>
      </div>

      <div id="alertBox" class="alert" role="alert"></div>

      <form id="forgotForm">
        <div class="form-group">
          <label for="email">Gmail</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Send Reset Link</button>
      </form>
    </div>
  </div>

  <script src="admin-auth.js"></script>
  <script>
    const form = document.getElementById('forgotForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending...';

      try {
        const data = await apiRequest('/api/auth/forgot-password', {
          method: 'POST',
          body: JSON.stringify({
            email: document.getElementById('email').value.trim()
          })
        });

        // Show success alert
        alertBox.className = 'alert alert-success';
        alertBox.textContent = data.message || 'Password reset link sent to email.';
        alertBox.style.display = 'block';
        alertBox.style.backgroundColor = '#d4edda';
        alertBox.style.color = '#155724';
        
        submitBtn.textContent = 'Link Sent';
      } catch (err) {
        showAlert(alertBox, err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Reset Link';
      }
    });
  </script>
</body>
</html>
