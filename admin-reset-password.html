<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Udyam Foundation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-auth.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Set New Password</h1>
        <p>Please enter your new password below</p>
      </div>

      <div id="alertBox" class="alert" role="alert"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" placeholder="Enter new password" required>
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Show password"></button>
          </div>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
            <button type="button" class="toggle-password" id="toggleConfirmPassword" aria-label="Show password"></button>
          </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">Update Password</button>
      </form>
      
      <div class="auth-footer" style="margin-top: 20px;">
        <a href="admin-login.html">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="admin-auth.js"></script>
  <script>
    const form = document.getElementById('resetForm');
    const alertBox = document.getElementById('alertBox');
    const submitBtn = document.getElementById('submitBtn');
    
    // Toggle for new password
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('togglePassword');
    toggleBtn.innerHTML = eyeIcon();
    initPasswordToggle(toggleBtn, passwordInput);

    // Toggle for confirm password
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const toggleConfirmBtn = document.getElementById('toggleConfirmPassword');
    toggleConfirmBtn.innerHTML = eyeIcon();
    initPasswordToggle(toggleConfirmBtn, confirmPasswordInput);

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      alertBox.className = 'alert alert-danger';
      alertBox.textContent = 'Invalid or missing reset token.';
      alertBox.style.display = 'block';
      submitBtn.disabled = true;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideAlert(alertBox);
      
      const newPassword = passwordInput.value;
      const confirmPassword = confirmPasswordInput.value;
      
      if (newPassword !== confirmPassword) {
        showAlert(alertBox, 'Passwords do not match.');
        return;
      }
      
      if (newPassword.length < 6) {
        showAlert(alertBox, 'Password must be at least 6 characters.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';

      try {
        const data = await apiRequest('/api/auth/reset-password', {
          method: 'POST',
          body: JSON.stringify({ token, newPassword })
        });

        // Show success alert
        alertBox.className = 'alert alert-success';
        alertBox.textContent = data.message || 'Password has been successfully reset.';
        alertBox.style.display = 'block';
        alertBox.style.backgroundColor = '#d4edda';
        alertBox.style.color = '#155724';
        
        form.reset();
        submitBtn.textContent = 'Updated';
        
        setTimeout(() => {
          window.location.href = 'admin-login.html';
        }, 3000);
      } catch (err) {
        showAlert(alertBox, err.message);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
      }
    });
  </script>
</body>
</html>
